services:
  postgres:
    image: postgres:15-alpine
    container_name: image-upload-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: image_upload
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/db/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - image-upload-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  image-upload-network:
    driver: bridge
