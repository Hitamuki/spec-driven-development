name: Deploy Hugo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "specs/hugo/**"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - run: hugo --minify
        working-directory: specs/hugo

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: specs/hugo/public

      - id: deployment
        uses: actions/deploy-pages@v4
